- model: ui.view
  ext_id: practice_checklist_view_checklist_list
  fields:
    name: "practice_checklist.checklist.list"
    title:
      $fallback: "Checklists"
    model_key: practice_checklist.checklist
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { name: id, width: 70 }
        - { name: name, sortable: true }
        - { name: status, chip: true }
        - { name: owner_id }
        - { name: is_public, width: 90 }
        - { name: closed_at }
      actions:
        - { name: new, type: create, icon: mdi-plus }
        - { name: edit, type: update, icon: mdi-pencil }
        - { name: delete, type: delete, icon: mdi-delete }
      row_actions:
        - key: close
          icon: mdi-check
          type: service
          method: close
        - key: reopen
          type: service
          icon: mdi-lock-open-variant-outline
          method: reopen
          model_key: practice_checklist.checklist
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.reopen_confirm"
      bulk_actions:
        - key: bulk_close
          type: service
          icon: mdi-check-all
          method: close 
          model_key: practice_checklist.checklist
          confirm:
            text: "¿Desea finalizar las listas seleccionadas?"

- model: ui.view
  ext_id: practice_checklist_view_checklist_form
  fields:
    name: "practice_checklist.checklist.form"
    title:
      $fallback: "Checklist"
    model_key: practice_checklist.checklist
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: "practice_checklist.groups.basic"
          fields: [name, status, owner_id, is_public]
        - label: "practice_checklist.groups.description"
          fields: [description]
        - label: "practice_checklist.groups.items"
          fields:
            - name: items  
              widget: one2many
              view: practice_checklist_view_item_inline
        - label: "practice_checklist.groups.audit"
          fields: [closed_at]
      form_actions:
        - key: close
          type: service
          icon: mdi-check
          method: close
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.close_confirm"
        - key: reopen
          type: service
          icon: mdi-lock-open-variant-outline
          method: reopen
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.reopen_confirm"

- model: ui.view
  ext_id: practice_checklist_view_item_list
  fields:
    name: "practice_checklist.checklist_item.list"
    title:
      $fallback: "Items"
    model_key: practice_checklist.checklist_item
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { name: id, width: 70 }
        - { name: checklist }
        - { name: title, sortable: true }
        - { name: assigned_user_id }
        - { name: is_done, chip: true }
        - { name: done_at }
      actions:
        - { name: new, type: create, icon: mdi-plus }
        - { name: edit, type: update, icon: mdi-pencil }
        - { name: delete, type: delete, icon: mdi-delete }
      row_actions:
        - key: mark_done
          type: service
          icon: mdi-check
          method: set_done
          model_key: practice_checklist.checklist_item
          groups: [practice_checklist_group_manager, core_group_superadmin]
        - key: mark_pending
          type: service
          icon: mdi-undo
          method: set_done
          model_key: practice_checklist.checklist_item
          groups: [practice_checklist_group_manager, core_group_superadmin]
          params:
            - name: done
              type: boolean
              default: false

- model: ui.view
  ext_id: practice_checklist_view_item_inline
  fields:
      name: "practice_checklist.checklist_item.inline"
      model_key: practice_checklist.checklist_item
      type_id.ext_id: ui.ui_view_type_list
      definition:
        columns:
          - { name: title, editable: true }
          - { name: assigned_user_id, editable: true }
          - { name: is_done, width: 100, editable: true }
          - { name: priority, editable: true, type: select } 
        actions:
          - { name: new, type: create, icon: mdi-plus }