- model: ui.view
  ext_id: practice_checklist_view_checklist_list
  fields:
    name: "practice_checklist.checklist.list"
    title:
      $fallback: "Checklists"
    model_key: practice_checklist.checklist
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: id, width: 70 }
        - { field: name, sortable: true }
        - { field: status, chip: true }
        - { field: owner_id }
        - { field: is_public, width: 90 }
        - { field: closed_at }
      actions:
        - { name: new, type: create, icon: mdi-plus }
        - { name: edit, type: update, icon: mdi-pencil }
        - { name: delete, type: delete, icon: mdi-delete }
      row_actions:
        - key: close
          icon: mdi-check
          type: service
          method: close
          model_key: practice_checklist.checklist
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.close_confirm"
        - key: reopen
          type: service
          icon: mdi-lock-open-variant-outline
          method: reopen
          model_key: practice_checklist.checklist
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.reopen_confirm"
      bulk_actions:
        - key: bulk_close
          type: service
          icon: mdi-check-all
          method: close 
          model_key: practice_checklist.checklist
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "¿Desea finalizar las listas seleccionadas?"

- model: ui.view
  ext_id: practice_checklist_view_checklist_form
  fields:
    name: "practice_checklist.checklist.form"
    title:
      $fallback: "Checklist"
    model_key: practice_checklist.checklist
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: "Básico"
          fields: [name, status, owner_id, is_public]
        - label: "Descripción"
          fields: [description]
        - label: "Ítems"
          fields:
            - name: items  
              widget: one2many
              view: practice_checklist_view_item_list
        - label: "Auditoría"
          fields: [closed_at]
      form_actions:
        - key: close
          type: service
          icon: mdi-check
          method: close
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.close_confirm"
        - key: reopen
          type: service
          icon: mdi-lock-open-variant-outline
          method: reopen
          groups: [practice_checklist_group_manager, core_group_superadmin]
          confirm:
            text: "practice_checklist.messages.reopen_confirm"

- model: ui.view
  ext_id: practice_checklist_view_item_list
  fields:
      name: "practice_checklist.checklist_item.list"
      model_key: practice_checklist.checklist_item
      type_id.ext_id: ui.ui_view_type_list
      definition:
        columns:
          - { field: title, editable: true }
          - { field: assigned_user_id, editable: true }
          - { field: is_done, width: 100, editable: true }
          - { field: priority, editable: true } 
        actions:
          - { name: new, type: create, icon: mdi-plus }

- model: ui.view
  ext_id: practice_checklist_view_item_form
  fields:
    name: "practice_checklist.checklist_item.form"
    title:
      $fallback: "Detalle de Ítem"
    model_key: practice_checklist.checklist_item
    type_id.ext_id: ui.ui_view_type_form
    definition:
      groups:
        - label: "Información del Ítem"
          fields: [checklist_id, title, priority, is_done]
        - label: "Notas y Seguimiento"
          fields: [note, assigned_user_id, done_at]